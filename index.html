<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <title>SuppLog</title>
  <link rel="manifest" href="manifest.json?v=6.1.0" />
  <link rel="stylesheet" href="style.css?v=6.1.0" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>SuppLog</h1>
      <p>在庫・飲み方・栄養を管理</p>
    </div>
    <div class="header-actions">
      <button id="openNutrition" class="ghost">栄養</button>
      <button id="openCost" class="ghost">費用</button>
      <button id="exportJson" class="ghost">バックアップ</button>
    </div>
  </header>

  <main>
    <section class="system-notice" id="systemNotice" hidden></section>
    <section class="alert-box" id="alertBox" aria-label="補充アラート"></section>
    <section class="stock-strip" id="stockStrip" aria-label="サプリ別残り日数"></section>

    <section class="routine-card" id="routineCard" aria-label="飲み方"></section>

    <section class="card list-card" id="listScreen">
      <div class="section-title">
        <div>
          <h2>サプリ一覧</h2>
          <p class="section-caption">タップで詳細・編集</p>
        </div>
        <button id="newItem" class="ghost">＋追加</button>
      </div>
      <div id="categoryList" class="category-list"></div>
    </section>

    <section class="card detail-card" id="detailCard" hidden>
      <div class="section-title">
        <h2 id="detailTitle">詳細</h2>
        <button id="closeDetail" class="ghost">戻る</button>
      </div>
      <div id="detailView"></div>
    </section>

    <section class="card cost-card" id="costScreen" hidden>
      <div class="section-title">
        <div>
          <h2>費用計算</h2>
          <p class="section-caption">価格入力済みのみ計算</p>
        </div>
        <button id="closeCost" class="ghost">戻る</button>
      </div>
      <div id="costView"></div>
    </section>

    <section class="card nutrition-card" id="nutritionScreen" hidden>
      <div class="section-title">
        <div>
          <h2>栄養情報</h2>
          <p class="section-caption">現在のサプリ構成から計算</p>
        </div>
        <button id="closeNutrition" class="ghost">戻る</button>
      </div>
      <div id="nutritionView"></div>
    </section>

    <section class="danger-zone">
      <button id="restoreDefault" class="danger ghost">初期データに戻す</button>
    </section>
  </main>

  <footer>
    <p>データはこのiPhone/ブラウザ内に保存されます。</p>
    <p class="version">Version: v6.1.0</p>
  </footer>

  <script src="app.js?v=6.1.0"></script>
</body>
</html>

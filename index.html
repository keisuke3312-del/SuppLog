<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111827" />
  <title>SuppLog</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>SuppLog</h1>
      <p>サプリの在庫・費用・終了予定を管理</p>
    </div>
    <button id="exportJson" class="ghost">バックアップ</button>
  </header>

  <main>
    <section class="summary-grid" id="summary"></section>

    <section class="card list-card">
      <div class="section-title">
        <h2>サプリ一覧</h2>
        <button id="newItem" class="ghost">＋追加</button>
      </div>
      <div id="categoryList" class="category-list"></div>
    </section>

    <section class="card detail-card" id="detailCard" hidden>
      <div class="section-title">
        <h2 id="detailTitle">詳細</h2>
        <button id="closeDetail" class="ghost">閉じる</button>
      </div>
      <div id="detailView"></div>
    </section>

    <section class="card form-card" id="formCard" hidden>
      <div class="section-title">
        <h2 id="formTitle">登録</h2>
        <button id="cancelEdit" class="ghost">キャンセル</button>
      </div>
      <form id="supplementForm">
        <input type="hidden" id="editId" />
        <div class="form-grid">
          <label>商品名<input id="name" required placeholder="例：Two-Per-Day" /></label>
          <label>カテゴリー
            <select id="category">
              <option value="ビタミン・ミネラル">ビタミン・ミネラル</option>
              <option value="食物繊維">食物繊維</option>
              <option value="医薬品・その他">医薬品・その他</option>
            </select>
          </label>
          <label>容量<input id="totalUnits" required type="number" min="1" step="1" /></label>
          <label>単位<input id="unitLabel" required placeholder="錠 / カプセル" /></label>
          <label>1日量<input id="dailyUnits" required type="number" min="0.1" step="0.1" /></label>
          <label>現在残量<input id="remainingUnits" required type="number" min="0" step="0.1" /></label>
          <label>購入価格<input id="price" type="number" min="0" step="1" placeholder="円" /></label>
          <label>開始日<input id="startDate" type="date" /></label>
          <label>購入先<input id="store" placeholder="iHerb / Amazon" /></label>
        </div>
        <label>メモ<textarea id="memo" rows="3" placeholder="例：次回は360カプセル版"></textarea></label>
        <div class="button-row">
          <button type="submit">保存</button>
          <button type="button" id="deleteFromForm" class="ghost danger">削除</button>
        </div>
      </form>
    </section>

    <section class="danger-zone">
      <button id="restoreDefault" class="danger ghost">初期データに戻す</button>
    </section>
  </main>

  <footer>
    <p>データはこのiPhone/ブラウザ内に保存されます。</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
